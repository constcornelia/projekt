<!DOCTYPE html>
<html>

<head>
  <title>YourSound</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>


  <nav>
    <div><a href="main.html"><img src="assets/images/icons/logo.svg"></a></div>
    <div>YourSound</div>
    <div class="space"></div>
    <a href="personal.html" class="ActionButton system-UI-accent clear-link">My collection</a>
  </nav>

  <section id="filters">
      <form action="" id="SearchForm">
          <input type="search" name="SearchInput" id="SearchInput" class="system-UI" placeholder="Search by playlist name, owner or genre">
          <button id="ButtonSearch" type="submit"></button>
      </form>

      <form id="FilterForm">
      <div id="genre">
        <select name="genre" id="SelectGenre" class="system-UI">
          <option value="">Select genre</option>
          <option value="ShowAll">all</option>
        </select>
      </div>

      <div id="likes">
        <label for="liked" class="system-UI">
          <input type="checkbox" id="liked" name="liked" value="liked">
          Show most admired song today</label>
      </div>
    </form>

  </section>


  <section id="PlaylistsCollection">
<!--event.stopPropagation(). ska behovas eller vi byta design
click på knappen också aktiverar länken-->
    <a href="public-playlist.html" class="clear-link">
      <div class="playlist-card">
        <div class="title-UI">Bohemian Rhapsody</div>
        <div class="playlist-actions">
          <button id="LikePlaylist"></button>
          <!--listener på LikePlaylist så AlertAddPlaylist bli synlig-->
          <button id="Play" class="StopPlaying"></button>
        </div>
      </div>
    </a>
    
  </section>
<!--osynlig nu ska visas när liked-->
  <div id="AlertAddPlaylist" class="edit-elements">
    <h1 class="title">the playlist</h1>
    <p class="text"> is added to your liked playlist</p>
    <div>
      <button id="Undo" type="reset" class="ActionButton-light system-UI-accent">Undo</button>
      <button id="Confirm" type="submit" class="ActionButton-light system-UI-accent">OK</button>
    </div>
  </div>

  <footer>
    <div>
      <p class="sub-title-bold">Digital design och utveckling III</p>
      <p class="sub-title-bold">Projekt</p>
      <p class="sub-title">&copy; 2026 Grupp 5</p>
    </div>
    <div>
      <p class="sub-title-bold">Developers</p>
      <p class="sub-title">Cornelia Rönnemyr Papic</p>
      <p class="sub-title">Dilara Kinali</p>
      <p class="sub-title">Elena Khusanova</p>
    </div>
  </footer>

  <script src="assets/js/ui.js"></script>
</body>

</html>
