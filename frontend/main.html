<!DOCTYPE html>
<html>

<head>
  <title>YourSound</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>


  <nav>
    <div><a href="main.html"><img src="../assets/images/icons/logo.svg"></a></div>
    <div>YourSound</div>
    <div class="space"></div>
    <a href="personal.html" class="ActionButton system-UI-accent">My collection</a>
  </nav>

  <section id="filters">
      <form action="" id="SearchForm">
        <div id="search" id="SearchSongs">
          <input type="search" name="SearchInput" placeholder="Search song, artist, genre" id="SearchInput" class="system-UI">
          <button id="ButtonSearch" type="submit"></button>
        </div>
      </form>

      <form id="FilterForm">
      <div id="genre">
        <select name="genre" id="SelectGenre" class="system-UI">
          <option value="">Select genre</option>
          <option value="ShowAll">all</option>
        </select>
      </div>

      <div id="likes">
        <label for="liked" class="system-UI">
          <input type="checkbox" id="liked" name="liked" value="liked">
          Show most admired song today</label>
      </div>


    </form>

  </section>


  <section id="PlaylistsCollection">

    <a href="playlist.html">
      <div class="song-card">
        <div class="title-UI">Bohemian Rhapsody</div>
        <div class="actions">
          <button id="LikePlaylist"><img src="../assets/images/icons/like.svg" alt=""></button>
          <button><img src="../assets/images/icons/play.svg" alt=""></button>
        </div>
      </div>
    </a>
    
  </section>

  <footer>
    <div>
      <p class="sub-title-bold">Digital design och utveckling III</p>
      <p class="sub-title-bold">Projekt</p>
      <p class="sub-title">&copy; 2026 Grupp 5</p>
    </div>
    <div>
      <p class="sub-title-bold">Developers</p>
      <p class="sub-title">Cornelia Rönnemyr Papic</p>
      <p class="sub-title">Dilara Kinali</p>
      <p class="sub-title">Elena Khusanova</p>
    </div>
  </footer>

  <script src="assets/js/ui.js"></script>
</body>

</html>
