<!DOCTYPE html>
<html>

<head>
  <title>YourSound</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>


  <nav>
    <div><a href="main.html"><img src="assets/images/icons/logo.svg"></a></div>
    <div>Personal Playlist</div>
    <div class="space"></div>
    <button id="EditPlaylist-Button" class="ActionButton">edit playlist</button>
    <!--listener på EditPlaylistButton så EditPlaylist bli synlig-->
    <button id="AddSong-Button" class="ActionButton system-UI-accent">add song</button>
    <!--listener på AddSongButton så AddSong div bli synlig-->
  </nav>
  <section class="hidden-elements">
    <!--osynlig nu ska visas när låt aderas listener på add song knappen-->
    <div id="AlertDeleteSong" class="edit-elements">
      <h1 class="title">the song</h1>
      <p class="text">Delete from playlist?</p>
      <div>
        <button id="UndoDeleteSongButton" type="button" class="ActionButton-light system-UI-accent">Undo</button>
        <button id="ConfirmDeleteSongButton" type="button" class="ActionButton-light system-UI-accent">OK</button>
      </div>
    </div>
    <!--osynlig nu ska visas när låt aderas
    listener på add song knappen-->
    <div id="AlertAddSong" class="edit-elements">
      <h1 class="title">the song</h1>
      <p class="text">is added to your playlist</p>
      <div>
        <button id="UndoAddSongButton" type="button" class="ActionButton-light system-UI-accent">Undo</button>
        <button id="ConfirmAddSongButton" type="button" class="ActionButton-light system-UI-accent">OK</button>
      </div>
    </div>
  </section>

  <section id="NewPlaylist" class="playlist-content">
    
    <!--osynlig nu ska visas när edit knapp ckickad-->
    <div id="EditPlaylist" class="edit-elements">
      <form id="EditPlaylistForm" class="system-UI">
        <h1 class="title">Edit playlist</h1>
        
        <div class="form-input-area">
          <label for="edit-cover" class="sub-title-bold">Playlist cover:</label>
          <input type="file" id="edit-cover" name="edit-cover" >
        </div>
  
        <div class="form-input-area">
          <label for="edit-playlist-name" class="sub-title-bold">Playlist name:</label>
          <input type="text" id="edit-playlist-name" name="edit-playlist-name">
        </div>

        <div class="form-input-area">
          <label for="edit-playlist-description" class="sub-title-bold">Playlist description:</label>
          <textarea id="edit-playlist-description" name="edit-playlist-description"></textarea>
        </div>
        <button type="button" id="DeletePlaylistButton" class="ActionButton-light system-UI-accent">Delete playlist</button>
        <button type="button" id="CancelEditButton" class="ActionButton-light system-UI-accent">Cancel editing</button>
        <button type="submit" id="SaveChangesPlaylistButton" class="ActionButton-light system-UI-accent">Save changes</button>
      </form>
    </div>

    <div class="songs">
      <h1 class="title">No songs yet let add them</h1>
      <button id="AddSong-Button" class="ActionButton-light system-UI-accent">add song</button>
    </div>
    <!--osynlig nu ska visas när add song knapp klickad-->
    <div id="AddSong" class="edit-elements">
      <form id="AddSongForm" class="system-UI">
        <h1 class="title">Add song to playlist</h1>
        <input type="search" name="SearchSongInput" id="SearchSongInput" placeholder="Search song">
        <button id="ButtonSearch" type="submit"></button>
      </form>
      <div id="SearchResultSongs">
        <ul>
          <!--alla li ska aderas genom search
          sen varenda låt kan aderas med knapp vid låtnamn-->
          <li>song<button type="button" class="AddSongButton">add song</button></li>
        </ul>
      </div>
    </div>

  </section>

  <footer>
    <div>
      <p class="sub-title">Digital design och utveckling III</p>
      <p class="sub-title">Projekt</p>
      <p class="sub-title">&copy; 2026 Grupp 5</p>
    </div>
    <div>
      <p class="sub-title">Developers</p>
      <p class="text">Cornelia Rönnemyr Papic</p>
      <p class="text">Dilara Kinali</p>
      <p class="text">Elena Khusanova</p>
    </div>
  </footer>

  <script src="assets/js/ui.js"></script>
</body>

</html>
