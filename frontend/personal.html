<!DOCTYPE html>
<html>

<head>
  <title>YourSound</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>


  <nav>
    <div><a href="main.html"><img src="assets/images/icons/logo.svg"></a></div>
    <div>My playlists collection</div>
    <div class="space"></div>
    <a href="edit-account.html" class="SecondaryButton system-UI-accent clear-link">Edit my account</a>
  </nav>

  <section class="filters">
    <form action="" id="SearchPaylistForm" class="system-UI">
        <input type="search" name="SearchInput" id="SearchInput" placeholder="Search by playlist name, owner or genre">
        <button id="ButtonSearch" type="submit"></button>
    </form>

    <form class="FilterForm system-UI">
      <div class="Select">
        <select id="SelectGenre"  name="genre">
          <option value="">Select genre</option>
          <option value="ShowAll">all</option>
        </select>
      </div>
      
      <label class="Sort-Playlists" for="Sort-Liked-playlists">My liked playlists
        <input type="radio" id="Sort-Liked-playlists" name="Sort-Liked-playlists"  value="Sort-Liked-playlists">
      </label>
      <label class="Sort-Playlists" for="All-Playlists">All my playlists
        <input type="radio" id="All-Playlists" name="All-Playlists"  value="All-Playlists">
      </label>

  </form>

</section>

<section id="PlaylistsCollection">
  <div id="CreatePlaylist" class="ActionButton">Create new playlist</div>

  <!--event.stopPropagation(). ska behovas eller vi byta design
  click på knappen också aktiverar länken-->
      <a href="playlist.html" class="clear-link">
        <div class="playlist-card">
          <div class="title-UI">Bohemian Rhapsody</div>
          <div class="playlist-actions">
            <button class="LikePlaylist-Button"></button>
            <button id="Play" class="StopPlaying"></button>
          </div>
        </div>
      </a>
      
    </section>
  
  <footer>
    <div>
      <p class="sub-title">Digital design och utveckling III</p>

      <p class="sub-title">&copy; 2026 Grupp 5</p>
    </div>
    <div>
      <p class="sub-title">Developers</p>
      <p class="text">Cornelia Rönnemyr Papic</p>
      <p class="text">Dilara Kinali</p>
      <p class="text">Elena Khusanova</p>
    </div>
  </footer>

  <script src="assets/js/ui.js"></script>
</body>

</html>
