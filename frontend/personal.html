<!DOCTYPE html>
<html>

<head>
  <title>YourSound</title>
  <meta charset="utf-8">

<body>


  <nav>
    <div><a href="main.html"><img src="assets/images/icons/logo.svg"></a></div>
    <div>My playlists collection</div>
    <div class="space"></div>
    <a href="edit-account.html" class="SecondaryButton system-UI-accent clear-link">Edit my account</a>
  </nav>

  <section class="filters">
    <form action="" id="SearchPaylistForm" class="system-UI">
        <input type="search" name="SearchInput" id="SearchInput" placeholder="Search by playlist name, owner or genre">
        <button id="ButtonSearch" type="submit"></button>
    </form>

    <form class="FilterForm system-UI">
      <div class="Select">
        <select id="SelectGenre"  name="genre">
          <option value="">Select genre</option>
          <option value="ShowAll">all</option>
        </select>
      </div>
      
      <label class="Sort-Playlists" for="Sort-Liked-playlists">My liked playlists
        <input type="radio" id="Sort-Liked-playlists" name="Sort-Liked-playlists"  value="Sort-Liked-playlists">
      </label>
      <label class="Sort-Playlists" for="All-Playlists">All my playlists
        <input type="radio" id="All-Playlists" name="All-Playlists"  value="All-Playlists">
      </label>

  </form>

</section>

<section id="PersonalPlaylistsCollection">
    <div class="add-playlist-card">
      <button class="CreatePlaylist-Button"></button>
      <div class="system-UI-accent">Create new playlist</div>
    </div>

      <a href="personal-playlist.html" class="clear-link">
        <div class="playlist-card">
          <div class="title-UI">Bohemian Rhapsody</div>
          <div class="playlist-actions">
            <button class="LikePlaylist-Button"></button>
            <button class="Play StopPlaying"></button>
          </div>
        </div>
      </a>
      <a href="personal-playlist.html" class="clear-link">
        <div class="playlist-card">
          <div class="title-UI">Bohemian Rhapsody</div>
          <div class="playlist-actions">
            <button class="LikePlaylist-Button"></button>
            <button class="Play StopPlaying"></button>
          </div>
        </div>
      </a>
      <a href="personal-playlist.html" class="clear-link">
        <div class="playlist-card">
          <div class="title-UI">Bohemian Rhapsody</div>
          <div class="playlist-actions">
            <button class="LikePlaylist-Button"></button>
            <button class="Play StopPlaying"></button>
          </div>
        </div>
      </a>
      <a href="personal-playlist.html" class="clear-link">
        <div class="playlist-card">
          <div class="title-UI">Bohemian Rhapsody</div>
          <div class="playlist-actions">
            <button class="LikePlaylist-Button"></button>
            <button class="Play StopPlaying"></button>
          </div>
        </div>
      </a>
      <a href="personal-playlist.html" class="clear-link">
        <div class="playlist-card">
          <div class="title-UI">Bohemian Rhapsody</div>
          <div class="playlist-actions">
            <button class="LikePlaylist-Button"></button>
            <button class="Play StopPlaying"></button>
          </div>
        </div>
      </a>
      
    </section>
    <!--osynlig nu ska visas när add playlist knapp ckickad-->
    <div id="CreatePlaylist" class="edit-elements">
      <form id="CreatePlaylistForm" class="system-UI">
        <h1 class="title">Create new playlist</h1>
        
        <div class="form-input-area">
          <label for="add-cover" class="sub-title-bold">Playlist cover:</label>
          <input type="file" id="add-cover" name="add-cover" >
        </div>
  
        <div class="form-input-area">
          <label for="playlist-name" class="sub-title-bold">Playlist name:</label>
          <input type="text" id="playlist-name" name="playlist-name">
        </div>

        <div class="form-input-area">
          <label for="playlist-description" class="sub-title-bold">Playlist description:</label>
          <textarea id="playlist-description" name="playlist-description"></textarea>
        </div>
        <button type="button" id="CancelCreateButton" class="ActionButton-light system-UI-accent">Cancel editing</button>
        <button type="submit" id="SaveChangesPlaylistButton" class="ActionButton-light system-UI-accent">Save changes</button>
        <!--SaveChangesPlaylistButton kan leda till playlist sidan New-playlist.html och därifrån låter aderas-->
      </form>
    </div>
